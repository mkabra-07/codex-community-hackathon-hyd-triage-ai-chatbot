<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Healthcare Triage Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main class="page-shell">
      <section class="chat-card">
        <header class="chat-header">
          <div>
            <p class="eyebrow">AI-Powered Triage</p>
            <h1>Healthcare Chatbot MVP</h1>
          </div>
          <span class="status-pill">Safety first</span>
        </header>

        <div class="disclaimer-banner">
          This is not medical advice. In an emergency, contact local emergency services immediately.
        </div>

        <section class="messages" id="messages" aria-live="polite"></section>

        <p class="error-text" id="errorText" hidden></p>

        <form class="composer" id="chatForm">
          <input
            id="messageInput"
            type="text"
            name="message"
            placeholder="Describe your symptoms..."
            autocomplete="off"
            required
          />
          <button type="submit" id="sendButton">Send</button>
        </form>
      </section>
    </main>

    <script>
      const initialMessage = {
        role: "assistant",
        text: "This is not medical advice. I can help assess how urgent your symptoms may be and suggest next steps. Please describe what you're feeling in your own words."
      };

      const messagesEl = document.getElementById("messages");
      const errorEl = document.getElementById("errorText");
      const formEl = document.getElementById("chatForm");
      const inputEl = document.getElementById("messageInput");
      const sendButtonEl = document.getElementById("sendButton");

      let sessionId = localStorage.getItem("triage-session-id");
      if (!sessionId) {
        sessionId = window.crypto && window.crypto.randomUUID ? window.crypto.randomUUID() : `session-${Date.now()}`;
        localStorage.setItem("triage-session-id", sessionId);
      }

      renderMessage(initialMessage);

      formEl.addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = inputEl.value.trim();
        if (!message) {
          return;
        }

        errorEl.hidden = true;
        renderMessage({ role: "user", text: message });
        inputEl.value = "";
        setLoading(true);
        const typingNode = renderTyping();

        try {
          const response = await fetch("/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ sessionId, message })
          });

          const payload = await response.json();
          typingNode.remove();

          if (!response.ok) {
            throw new Error(payload.error || "Something went wrong.");
          }

          renderMessage({
            role: "assistant",
            text: payload.reply,
            assessment: payload.assessment
          });
        } catch (error) {
          typingNode.remove();
          errorEl.hidden = false;
          errorEl.textContent = error.message || "Unable to reach the triage service.";
        } finally {
          setLoading(false);
        }
      });

      function renderMessage(message) {
        const row = document.createElement("article");
        row.className = `bubble-row ${message.role === "user" ? "bubble-row-user" : ""}`;

        const bubble = document.createElement("div");
        bubble.className = `bubble ${message.role === "user" ? "bubble-user" : "bubble-assistant"}`;

        const text = document.createElement("p");
        text.textContent = message.text;
        bubble.appendChild(text);

        if (message.assessment) {
          const assessmentCard = document.createElement("div");
          assessmentCard.className = "assessment-card";

          const badge = document.createElement("span");
          badge.className = `risk-badge risk-${message.assessment.risk_level.toLowerCase()}`;
          badge.textContent = message.assessment.risk_level;
          assessmentCard.appendChild(badge);

          const reasoning = document.createElement("p");
          reasoning.className = "assessment-reason";
          reasoning.textContent = message.assessment.reasoning;
          assessmentCard.appendChild(reasoning);

          if (Array.isArray(message.assessment.next_steps) && message.assessment.next_steps.length) {
            const list = document.createElement("ul");
            message.assessment.next_steps.forEach((step) => {
              const item = document.createElement("li");
              item.textContent = step;
              list.appendChild(item);
            });
            assessmentCard.appendChild(list);
          }

          bubble.appendChild(assessmentCard);
        }

        row.appendChild(bubble);
        messagesEl.appendChild(row);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return row;
      }

      function renderTyping() {
        const row = document.createElement("article");
        row.className = "bubble-row";

        const bubble = document.createElement("div");
        bubble.className = "bubble bubble-assistant bubble-typing";
        bubble.innerHTML = "<span></span><span></span><span></span>";

        row.appendChild(bubble);
        messagesEl.appendChild(row);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return row;
      }

      function setLoading(isLoading) {
        inputEl.disabled = isLoading;
        sendButtonEl.disabled = isLoading;
        sendButtonEl.textContent = isLoading ? "Sending..." : "Send";
      }
    </script>
  </body>
</html>
